<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashby Chart: Dark Mode & Density</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body { font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: #121212; color: #fff; }
        .chart-container { background: #1e1e1e; border-radius: 12px; border: 1px solid #333; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #fff; font-size: 24px; font-weight: 300; }
        .description { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="chart-container">
    <h1>Ashby Chart: Density Distribution</h1>
    <div class="description">Dark mode visualization emphasizing the "heat" or density of material properties across classes.</div>
    <div id="chart"></div>
</div>

<script>
const materials = [
  {family: 'Metals', name: 'Steel', density: 7800, modulus: 200},
  {family: 'Metals', name: 'Aluminum', density: 2700, modulus: 69},
  {family: 'Metals', name: 'Titanium', density: 4500, modulus: 110},
  {family: 'Metals', name: 'Copper', density: 8900, modulus: 117},
  {family: 'Metals', name: 'Magnesium', density: 1740, modulus: 45},
  {family: 'Metals', name: 'Tungsten', density: 19250, modulus: 400},
  {family: 'Metals', name: 'Zinc', density: 7140, modulus: 108},
  {family: 'Metals', name: 'Lead', density: 11340, modulus: 16},
  
  {family: 'Polymers', name: 'Nylon', density: 1150, modulus: 2.5},
  {family: 'Polymers', name: 'Polycarbonate', density: 1200, modulus: 2.3},
  {family: 'Polymers', name: 'PVC', density: 1350, modulus: 3.0},
  {family: 'Polymers', name: 'Polyethylene', density: 950, modulus: 0.8},
  {family: 'Polymers', name: 'Polypropylene', density: 900, modulus: 1.2},
  {family: 'Polymers', name: 'PTFE', density: 2200, modulus: 0.5},
  {family: 'Polymers', name: 'Epoxy', density: 1200, modulus: 3.5},
  {family: 'Polymers', name: 'Rubber', density: 1100, modulus: 0.05},

  {family: 'Ceramics', name: 'Alumina', density: 3900, modulus: 380},
  {family: 'Ceramics', name: 'Silicon Carbide', density: 3100, modulus: 410},
  {family: 'Ceramics', name: 'Glass', density: 2500, modulus: 70},
  {family: 'Ceramics', name: 'Concrete', density: 2400, modulus: 30},
  {family: 'Ceramics', name: 'Brick', density: 2000, modulus: 20},
  {family: 'Ceramics', name: 'Diamond', density: 3500, modulus: 1050},
  {family: 'Ceramics', name: 'Zirconia', density: 6000, modulus: 210},

  {family: 'Composites', name: 'CFRP', density: 1500, modulus: 150},
  {family: 'Composites', name: 'GFRP', density: 1900, modulus: 45},
  {family: 'Composites', name: 'Plywood', density: 600, modulus: 10},
  {family: 'Composites', name: 'MDF', density: 750, modulus: 4},
  {family: 'Composites', name: 'Kevlar/Epoxy', density: 1400, modulus: 80},

  {family: 'Woods/Foams', name: 'Cork', density: 200, modulus: 0.03},
  {family: 'Woods/Foams', name: 'Balsa', density: 150, modulus: 0.05},
  {family: 'Woods/Foams', name: 'Pine', density: 500, modulus: 11},
  {family: 'Woods/Foams', name: 'Oak', density: 700, modulus: 13},
  {family: 'Woods/Foams', name: 'PU Foam', density: 50, modulus: 0.01}
];

const allDensities = materials.map(m => m.density);
const allModuli = materials.map(m => m.modulus);

const traces = [];

// Density Contour underlying the data
// Note: histogram2dcontour works better on linear scale data if we want smooth blobs in log space,
// so we will map the x/y to log space manually for the contour.
traces.push({
    x: allDensities.map(d => Math.log10(d)),
    y: allModuli.map(m => Math.log10(m)),
    type: 'histogram2dcontour',
    colorscale: 'Viridis',
    reversescale: true,
    showscale: false,
    ncontours: 20,
    contours: { coloring: 'heatmap' },
    hoverinfo: 'skip'
});

const families = [...new Set(materials.map(m => m.family))];
const colors = {
    'Metals': '#ff5252',
    'Polymers': '#448aff',
    'Ceramics': '#ffb142',
    'Composites': '#b33771',
    'Woods/Foams': '#1dd1a1'
};

// Overlay scatter points mapped back to linear scale (but axes are NOT log since we did math.log10 manually above for contour mapping).
// Wait, if we use manual log10 for contour, we must do manual log10 for scatter to match coordinates.
// Plotly's `xaxis.type='log'` doesn't play perfectly with 2D contours sometimes, so mapping manually is safer.
families.forEach(family => {
    let familyData = materials.filter(m => m.family === family);
    traces.push({
        x: familyData.map(m => Math.log10(m.density)),
        y: familyData.map(m => Math.log10(m.modulus)),
        mode: 'markers',
        name: family,
        text: familyData.map(m => m.name),
        marker: {
            size: 10,
            color: colors[family],
            line: { color: '#000', width: 1.5 }
        },
        hovertemplate: '<b>%{text}</b><br>Log Density: %{x:.2f}<br>Log Modulus: %{y:.2f}<extra></extra>'
    });
});

const layout = {
    xaxis: {
        title: 'Density (log₁₀ kg/m³)',
        gridcolor: '#333',
        zerolinecolor: '#444',
        tickfont: { color: '#aaa' },
        titlefont: { color: '#eee' }
    },
    yaxis: {
        title: "Young's Modulus (log₁₀ GPa)",
        gridcolor: '#333',
        zerolinecolor: '#444',
        tickfont: { color: '#aaa' },
        titlefont: { color: '#eee' }
    },
    plot_bgcolor: '#1e1e1e',
    paper_bgcolor: '#1e1e1e',
    hovermode: 'closest',
    margin: { l: 60, r: 40, t: 40, b: 60 },
    legend: { x: 1.02, y: 1, font: { color: '#eee' } },
    annotations: [
        {
            x: 2.2, y: -2,
            text: 'Light & Soft',
            showarrow: false,
            font: { color: '#888', size: 16 }
        },
        {
            x: 4.2, y: 2.8,
            text: 'Dense & Stiff',
            showarrow: false,
            font: { color: '#888', size: 16 }
        }
    ]
};

Plotly.newPlot('chart', traces, layout, {responsive: true});
</script>

</body>
</html>
