<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashby Chart: Interactive Explorer</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; display: flex; height: 100vh;}
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .chart-container { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); flex: 1; padding: 20px; min-height: 0; display: flex; flex-direction: column;}
        #chart { flex: 1; }
        h1, h2 { color: #2c3e50; margin-top: 0; }
        h1 { font-size: 20px; }
        h2 { font-size: 16px; margin-top: 20px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; color: #555;}
        input[type="range"] { width: 100%; }
        .val-display { float: right; color: #007bff; font-weight: bold; }
        .checkbox-label { font-weight: normal; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .family-color { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>Ashby Explorer</h1>
    
    <h2>Material Families</h2>
    <div id="family-filters"></div>

    <h2>Design Guidelines</h2>
    <div class="control-group">
        <label>Performance Index (Slope) <span id="slope-val" class="val-display">1.0</span></label>
        <input type="range" id="slope-slider" min="0.5" max="3" step="0.5" value="1">
        <small style="color: #888; display: block; margin-top: 4px;">E.g. Slope=1 (E/ρ), Slope=2 (E^(1/2)/ρ)</small>
    </div>
    
    <div class="control-group">
        <label>Guideline Intercept <span id="intercept-val" class="val-display">0</span></label>
        <input type="range" id="intercept-slider" min="-2" max="2" step="0.1" value="0">
    </div>
</div>

<div class="main-content">
    <div class="chart-container">
        <div id="chart"></div>
    </div>
</div>

<script>
const materials = [
  {family: 'Metals', name: 'Steel', density: 7800, modulus: 200},
  {family: 'Metals', name: 'Aluminum', density: 2700, modulus: 69},
  {family: 'Metals', name: 'Titanium', density: 4500, modulus: 110},
  {family: 'Metals', name: 'Copper', density: 8900, modulus: 117},
  {family: 'Metals', name: 'Magnesium', density: 1740, modulus: 45},
  {family: 'Metals', name: 'Tungsten', density: 19250, modulus: 400},
  {family: 'Metals', name: 'Zinc', density: 7140, modulus: 108},
  {family: 'Metals', name: 'Lead', density: 11340, modulus: 16},
  
  {family: 'Polymers', name: 'Nylon', density: 1150, modulus: 2.5},
  {family: 'Polymers', name: 'Polycarbonate', density: 1200, modulus: 2.3},
  {family: 'Polymers', name: 'PVC', density: 1350, modulus: 3.0},
  {family: 'Polymers', name: 'Polyethylene', density: 950, modulus: 0.8},
  {family: 'Polymers', name: 'Polypropylene', density: 900, modulus: 1.2},
  {family: 'Polymers', name: 'PTFE', density: 2200, modulus: 0.5},
  {family: 'Polymers', name: 'Epoxy', density: 1200, modulus: 3.5},
  {family: 'Polymers', name: 'Rubber', density: 1100, modulus: 0.05},

  {family: 'Ceramics', name: 'Alumina', density: 3900, modulus: 380},
  {family: 'Ceramics', name: 'Silicon Carbide', density: 3100, modulus: 410},
  {family: 'Ceramics', name: 'Glass', density: 2500, modulus: 70},
  {family: 'Ceramics', name: 'Concrete', density: 2400, modulus: 30},
  {family: 'Ceramics', name: 'Brick', density: 2000, modulus: 20},
  {family: 'Ceramics', name: 'Diamond', density: 3500, modulus: 1050},
  {family: 'Ceramics', name: 'Zirconia', density: 6000, modulus: 210},

  {family: 'Composites', name: 'CFRP', density: 1500, modulus: 150},
  {family: 'Composites', name: 'GFRP', density: 1900, modulus: 45},
  {family: 'Composites', name: 'Plywood', density: 600, modulus: 10},
  {family: 'Composites', name: 'MDF', density: 750, modulus: 4},
  {family: 'Composites', name: 'Kevlar/Epoxy', density: 1400, modulus: 80},

  {family: 'Woods/Foams', name: 'Cork', density: 200, modulus: 0.03},
  {family: 'Woods/Foams', name: 'Balsa', density: 150, modulus: 0.05},
  {family: 'Woods/Foams', name: 'Pine', density: 500, modulus: 11},
  {family: 'Woods/Foams', name: 'Oak', density: 700, modulus: 13},
  {family: 'Woods/Foams', name: 'PU Foam', density: 50, modulus: 0.01}
];

const families = [...new Set(materials.map(m => m.family))];
const colors = {
    'Metals': '#e74c3c',
    'Polymers': '#3498db',
    'Ceramics': '#f39c12',
    'Composites': '#9b59b6',
    'Woods/Foams': '#2ecc71'
};

// UI State
let visibleFamilies = new Set(families);
let slope = 1.0;
let intercept = 0.0;

// Initialize filters
const filterContainer = document.getElementById('family-filters');
families.forEach(f => {
    const div = document.createElement('div');
    div.className = 'control-group';
    div.innerHTML = `
        <label class="checkbox-label">
            <input type="checkbox" checked value="${f}"> 
            <span class="family-color" style="background: ${colors[f]}"></span>
            ${f}
        </label>
    `;
    div.querySelector('input').addEventListener('change', (e) => {
        if(e.target.checked) visibleFamilies.add(f);
        else visibleFamilies.delete(f);
        render();
    });
    filterContainer.appendChild(div);
});

// Event Listeners for sliders
document.getElementById('slope-slider').addEventListener('input', e => {
    slope = parseFloat(e.target.value);
    document.getElementById('slope-val').textContent = slope.toFixed(1);
    render();
});
document.getElementById('intercept-slider').addEventListener('input', e => {
    intercept = parseFloat(e.target.value);
    document.getElementById('intercept-val').textContent = intercept.toFixed(1);
    render();
});

function render() {
    const traces = [];

    // Data Traces (using bubble chart aesthetic, mapping modulus and density)
    families.forEach(family => {
        if (!visibleFamilies.has(family)) return;
        
        let familyData = materials.filter(m => m.family === family);
        
        traces.push({
            x: familyData.map(m => m.density),
            y: familyData.map(m => m.modulus),
            mode: 'markers',
            name: family,
            text: familyData.map(m => m.name),
            marker: {
                size: 14,
                color: colors[family],
                line: { color: 'white', width: 2 },
                opacity: 0.8
            },
            hovertemplate: '<b>%{text}</b><br>Density: %{x} kg/m³<br>Modulus: %{y} GPa<extra></extra>'
        });
    });

    // Guideline Trace
    // Equation: log(E) = slope * log(rho) + intercept
    // => E = 10^intercept * rho^slope
    const rho_min = 10;
    const rho_max = 30000;
    
    // We want the line to look straight on log-log plot.
    traces.push({
        x: [rho_min, rho_max],
        y: [
            Math.pow(10, intercept) * Math.pow(rho_min, slope), 
            Math.pow(10, intercept) * Math.pow(rho_max, slope)
        ],
        mode: 'lines',
        name: `Guide (Slope=${slope})`,
        line: { color: '#34495e', dash: 'dot', width: 2 },
        hoverinfo: 'skip'
    });

    const layout = {
        title: "Materials Property Space",
        xaxis: {
            type: 'log',
            title: 'Density (kg/m³)',
            gridcolor: '#ecf0f1',
            range: [1.5, 4.5] // log10 range
        },
        yaxis: {
            type: 'log',
            title: "Young's Modulus (GPa)",
            gridcolor: '#ecf0f1',
            range: [-2.5, 3.5] // log10 range
        },
        plot_bgcolor: 'white',
        paper_bgcolor: 'white',
        hovermode: 'closest',
        margin: { l: 60, r: 40, t: 50, b: 60 },
        legend: { x: 1.02, y: 1 }
    };

    Plotly.newPlot('chart', traces, layout, {responsive: true, displayModeBar: false});
}

// Initial Render
render();

</script>
</body>
</html>
