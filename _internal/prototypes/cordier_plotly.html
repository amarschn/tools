<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cordier Diagram Prototype (Plotly)</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 40px; background-color: #f0f2f5; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-radius: 12px; }
    h1 { text-align: center; color: #1a202c; font-weight: 600; margin-top: 0; }
    p { text-align: center; color: #4a5568; margin-bottom: 30px; }
    #plot { width: 100%; height: 600px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Turbomachinery Specific Speed vs. Specific Diameter</h1>
  <p>Cordier / Balje Diagram Prototype identifying islands of efficiency.</p>
  <div id="plot"></div>
</div>
<script>
  // Approximate Cordier line data points
  const nsLine = [0.1, 0.2, 0.5, 1, 2, 3, 5, 10];
  const dsLine = [9.5, 5.0, 2.3, 1.4, 0.95, 0.75, 0.55, 0.4];

  const cordierTrace = {
    x: nsLine,
    y: dsLine,
    mode: 'lines+markers',
    name: 'Optimal Line (Cordier)',
    line: { color: '#2d3748', width: 4, shape: 'spline' },
    marker: { size: 8, color: '#2d3748', symbol: 'diamond' }
  };
  
  // Example of a scatter of real-world machines
  const scatterTrace = {
    x: [0.15, 0.3, 0.6, 0.8, 1.2, 2.5, 4.0, 7.0, 8.5],
    y: [8.0, 4.5, 2.0, 1.8, 1.3, 0.8, 0.6, 0.45, 0.4],
    mode: 'markers',
    name: 'Real-world Machines',
    marker: { size: 6, color: 'rgba(237, 137, 54, 0.8)' }
  }

  // Define regions (Radial, Mixed, Axial)
  const shapes = [
    { type: 'rect', x0: 0.1, x1: 1, y0: 0.2, y1: 20, fillcolor: 'rgba(229, 62, 62, 0.1)', line: { width: 0 }, layer: 'below' },
    { type: 'rect', x0: 1, x1: 3, y0: 0.2, y1: 20, fillcolor: 'rgba(49, 130, 206, 0.1)', line: { width: 0 }, layer: 'below' },
    { type: 'rect', x0: 3, x1: 10, y0: 0.2, y1: 20, fillcolor: 'rgba(56, 161, 105, 0.1)', line: { width: 0 }, layer: 'below' }
  ];

  const annotations = [
    { x: Math.log10(0.31), y: Math.log10(12), text: 'RADIAL (CENTRIFUGAL)', showarrow: false, font: { size: 16, color: '#c53030', weight: 'bold' } },
    { x: Math.log10(1.73), y: Math.log10(12), text: 'MIXED FLOW', showarrow: false, font: { size: 16, color: '#2b6cb0', weight: 'bold' } },
    { x: Math.log10(5.47), y: Math.log10(12), text: 'AXIAL', showarrow: false, font: { size: 16, color: '#276749', weight: 'bold' } }
  ];

  const layout = {
    xaxis: {
      type: 'log',
      title: { text: 'Specific Speed (Ns)', font: { size: 14, weight: 'bold' } },
      range: [Math.log10(0.1), Math.log10(10)],
      gridcolor: '#e2e8f0',
      zeroline: false
    },
    yaxis: {
      type: 'log',
      title: { text: 'Specific Diameter (Ds)', font: { size: 14, weight: 'bold' } },
      range: [Math.log10(0.2), Math.log10(20)],
      gridcolor: '#e2e8f0',
      zeroline: false
    },
    shapes: shapes,
    annotations: annotations,
    plot_bgcolor: '#ffffff',
    paper_bgcolor: 'white',
    margin: { l: 70, r: 40, t: 30, b: 70 },
    hovermode: 'closest',
    legend: { x: 0.75, y: 0.95, bgcolor: 'rgba(255,255,255,0.8)' }
  };

  Plotly.newPlot('plot', [cordierTrace, scatterTrace], layout, {responsive: true});
</script>
</body>
</html>
