<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cordier Diagram - ECharts (Dark Theme)</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chart-container { width: 100%; max-width: 900px; height: 600px; background: #1e293b; border-radius: 12px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #334155; }
    h2 { text-align: center; margin-top: 0; font-weight: 500; color: #f1f5f9; letter-spacing: -0.02em; }
    #main { width: 100%; height: 500px; }
  </style>
</head>
<body>
  <div class="chart-container">
    <h2>Balje / Cordier Performance Map</h2>
    <div id="main"></div>
  </div>
  <script>
    var chartDom = document.getElementById('main');
    var myChart = echarts.init(chartDom);
    
    // Cordier optimal line data
    const dataLine = [
      [0.1, 9.5], [0.2, 5.0], [0.5, 2.3],
      [1.0, 1.4], [2.0, 0.95], [3.0, 0.75],
      [5.0, 0.55], [10.0, 0.4]
    ];

    var option = {
      tooltip: { trigger: 'item', formatter: 'Ns: {c0}<br />Ds: {c1}' },
      xAxis: {
        type: 'log',
        name: 'Specific Speed (Ns)',
        nameLocation: 'middle',
        nameGap: 30,
        min: 0.1, max: 10,
        splitLine: { show: true, lineStyle: { color: '#334155', type: 'dashed' } },
        axisLabel: { color: '#94a3b8' },
        nameTextStyle: { color: '#cbd5e1', fontSize: 14 }
      },
      yAxis: {
        type: 'log',
        name: 'Specific Diameter (Ds)',
        nameLocation: 'middle',
        nameGap: 40,
        min: 0.2, max: 20,
        splitLine: { show: true, lineStyle: { color: '#334155', type: 'dashed' } },
        axisLabel: { color: '#94a3b8' },
        nameTextStyle: { color: '#cbd5e1', fontSize: 14 }
      },
      series: [
        {
          name: 'Cordier Line',
          type: 'line',
          smooth: true,
          data: dataLine,
          symbolSize: 10,
          lineStyle: { width: 4, color: '#38bdf8', shadowColor: 'rgba(56, 189, 248, 0.5)', shadowBlur: 10 },
          itemStyle: { color: '#38bdf8' }
        },
        {
          type: 'line',
          markArea: {
            silent: true,
            itemStyle: { opacity: 0.1 },
            data: [
              [{ xAxis: 0.1, itemStyle: { color: '#f87171' } }, { xAxis: 1.0 }],
              [{ xAxis: 1.0, itemStyle: { color: '#a78bfa' } }, { xAxis: 3.0 }],
              [{ xAxis: 3.0, itemStyle: { color: '#34d399' } }, { xAxis: 10.0 }]
            ]
          }
        }
      ],
      graphic: [
        { type: 'text', left: '22%', top: '15%', style: { text: 'RADIAL', fill: '#f87171', font: 'bold 20px sans-serif', opacity: 0.8 } },
        { type: 'text', left: '55%', top: '15%', style: { text: 'MIXED', fill: '#a78bfa', font: 'bold 20px sans-serif', opacity: 0.8 } },
        { type: 'text', left: '80%', top: '15%', style: { text: 'AXIAL', fill: '#34d399', font: 'bold 20px sans-serif', opacity: 0.8 } }
      ]
    };

    myChart.setOption(option);
    window.addEventListener('resize', () => myChart.resize());
  </script>
</body>
</html>
