<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer & Exporter Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <h2>3D Viewer Prototype</h2>
        <div class="controls">
            <button id="btn-generate" disabled>Loading CAD Engine...</button>
        </div>
        <div class="controls">
            <button id="btn-stl" disabled>Download STL</button>
            <button id="btn-step" disabled>Download STEP</button>
        </div>
        <div id="status">Initializing...</div>
    </div>
    <div id="viewer-container"></div>
    
    <!-- Import Maps -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
