<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Corrected Thrust &amp; RPM &mdash; Transparent Tools</title>
<link rel="manifest" href="/manifest.json">
<script>
  window.MathJax = {
    tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
    chtml: { scale: 1.05 },
    startup: { typeset: false }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
:root{
  --bg:#fff; --ink:#000; --soft:#f4f4f4; --line:#000; --line-2:#d4d4d4;
  --muted:#525252; --accent:#dc2626;
  --sans:'Helvetica Neue','Inter','Helvetica','Arial',sans-serif;
  --mono:'IBM Plex Mono','SF Mono','Menlo',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:19px;line-height:1.5;-webkit-font-smoothing:antialiased}
.nav{padding:18px 26px;border-bottom:2px solid var(--line);display:grid;grid-template-columns:1fr auto 1fr;align-items:baseline;font-size:0.95rem;letter-spacing:.06em;text-transform:uppercase}
.nav .l{justify-self:start}.nav .c{justify-self:center}.nav .r{justify-self:end}
.nav a{color:var(--ink);text-decoration:none;font-weight:600}
main{max-width:840px;margin:0 auto;padding:28px 24px 60px}
.headline{display:grid;grid-template-columns:1fr;gap:16px;align-items:end;padding-bottom:18px;border-bottom:2px solid var(--line);margin-bottom:22px}
h1{font-size:2.25rem;font-weight:700;letter-spacing:-.015em;line-height:1.05;margin-bottom:8px}
.tagline{font-size:1.1rem;color:var(--muted)}

.ct-card{padding:26px 0;border-bottom:1px solid var(--line-2)}
.ct-card h2{font-size:1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);margin-bottom:20px;display:flex;align-items:center;gap:14px}
.ct-card h2::before{content:'';width:18px;height:18px;background:var(--accent);display:inline-block}

.ct-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1.5px solid var(--line)}
.ct-toggle button{border:none;background:var(--bg);color:var(--ink);padding:20px 14px;font:inherit;font-size:1.1rem;font-weight:600;cursor:pointer;letter-spacing:.02em;border-right:1.5px solid var(--line)}
.ct-toggle button:last-child{border-right:none}
.ct-toggle button.is-active{background:var(--ink);color:var(--bg)}
.ct-mode-desc{color:var(--muted);font-size:1.1rem;margin-top:16px}

.ct-field{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:22px}
.ct-field label{font-size:0.98rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:baseline}
.ct-hint{font-weight:400;letter-spacing:.02em;text-transform:none;color:var(--muted);opacity:.8;font-size:0.98rem}
.ct-input-row{display:grid;grid-template-columns:1fr auto;gap:0;border:1.5px solid var(--line)}
.ct-input-row input{border:none;background:var(--bg);font-family:var(--mono);font-size:1.45rem;font-weight:500;padding:18px 16px;color:var(--ink);min-width:0;-moz-appearance:textfield}
.ct-input-row input::-webkit-outer-spin-button,.ct-input-row input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.ct-input-row input:focus{outline:none;background:#fffbe6}
.ct-input-row select{border:none;border-left:1.5px solid var(--line);background:var(--soft);font-family:var(--mono);font-size:1.15rem;padding:18px 34px 18px 14px;cursor:pointer;color:var(--ink);min-width:108px;-webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%23dc2626' stroke-width='2' stroke-linecap='square'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;background-size:12px 8px}
.ct-input-row select:hover{background-color:#ebe5e5}
.ct-input-row select:focus{outline:none;background-color:#fffbe6}
.ct-input-row--full input{grid-column:1/-1}
.ct-unit-static{border-left:1.5px solid var(--line);background:var(--soft);padding:18px 16px;font-family:var(--mono);font-size:1.15rem;color:var(--muted)}

.ct-cmode-tabs{display:grid;grid-template-columns:repeat(3,1fr);border:1.5px solid var(--line);margin-bottom:22px}
.ct-cmode-tabs button{border:none;background:var(--bg);padding:16px 4px;font:inherit;font-size:0.92rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;color:var(--ink);border-right:1.5px solid var(--line)}
.ct-cmode-tabs button:last-child{border-right:none}
.ct-cmode-tabs button.is-active{background:var(--ink);color:var(--bg)}

.ct-calc-btn{display:block;width:100%;padding:22px;background:var(--accent);color:var(--bg);border:none;border-radius:0;font:inherit;font-size:1.25rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin:26px 0 18px}
.ct-calc-btn:active{background:#991b1b}

.ct-primary{background:var(--ink);color:var(--bg);padding:34px 28px;margin:24px 0;display:grid;grid-template-columns:auto 1fr;gap:10px 26px;align-items:end}
.ct-primary-label{grid-column:1/-1;font-size:1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--bg);opacity:.65}
.ct-primary-value{font-family:var(--sans);font-size:5rem;font-weight:800;line-height:.95;letter-spacing:-.045em;color:var(--accent)}
.ct-primary-unit{font-family:var(--sans);font-size:1.35rem;font-weight:500;color:var(--bg);align-self:start;padding-top:10px;margin-left:0}
.ct-primary-sub{grid-column:1/-1;font-size:1.15rem;color:var(--bg);opacity:.88;border-top:1px solid #444;padding-top:14px;margin-top:10px}
.ct-primary-error{grid-column:1/-1;color:var(--accent);font-weight:600;font-size:1.1rem}

.ct-detail h2::before{background:var(--ink)}
.ct-row{display:grid;grid-template-columns:1fr auto;padding:14px 0;border-bottom:1px solid var(--line-2);font-size:1.1rem;gap:16px}
.ct-row:last-child{border-bottom:none}
.ct-row-k{color:var(--muted)}
.ct-row-v{font-family:var(--mono);font-weight:500;text-align:right}

.ct-audit{margin-top:20px;border-top:2px solid var(--line);padding-top:14px}
.ct-audit>summary{cursor:pointer;list-style:none;font-size:1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 0;color:var(--ink)}
.ct-audit>summary::-webkit-details-marker{display:none}
.ct-audit>summary::before{content:'+ '}
.ct-audit[open]>summary::before{content:'− '}
.ct-audit-body{padding-top:12px}
.ct-step{padding:12px 0;border-top:1px solid var(--line-2);font-size:1.05rem}
.ct-step:first-child{border-top:none}
.ct-step-name{font-size:0.92rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.ct-step-eq,.ct-step-detail{font-family:var(--mono);font-size:1rem;color:var(--ink);overflow-x:auto}
.ct-step-eq strong{color:var(--accent)}

.ct-explain summary{cursor:pointer;list-style:none;font-size:1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 0}
.ct-explain summary::before{content:'+ '}
.ct-explain details[open] summary::before{content:'− '}
.ct-explain-body{padding-top:16px;color:var(--muted);font-size:1.1rem}
.ct-explain-body p{margin-bottom:14px}
.ct-explain-body strong{color:var(--ink)}
.ct-explain-body ul.ct-assume{margin:8px 0 14px 20px;padding:0}
.ct-explain-body ul.ct-assume li{margin-bottom:9px;padding-left:4px}
.ct-eq{display:block;font-family:var(--mono);font-size:1.1rem;padding:12px 16px;background:var(--soft);border-left:4px solid var(--accent);margin:10px 0}
.ct-eq-inline{font-family:var(--mono);font-size:1.05rem;background:var(--soft);padding:2px 6px}

.colophon{margin-top:40px;padding-top:18px;border-top:2px solid var(--line);font-family:var(--mono);font-size:0.88rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}

/* Export bar */
.ct-export{padding:26px 0;border-bottom:1px solid var(--line-2)}
.ct-export h2{font-size:1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);margin-bottom:18px;display:flex;align-items:center;gap:14px}
.ct-export h2::before{content:'';width:18px;height:18px;background:var(--accent);display:inline-block}
.ct-export-buttons{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.ct-export-btn{padding:18px 14px;border:1.5px solid var(--ink);background:var(--ink);color:var(--bg);font:inherit;font-family:var(--sans);font-size:1.05rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:0}
.ct-export-btn:active{background:#333}
.ct-export-btn--alt{background:var(--bg);color:var(--ink)}
.ct-export-btn--alt:active{background:var(--soft)}
.ct-export-toast{margin-top:12px;min-height:1.2em;font-family:var(--mono);font-size:0.92rem;color:var(--accent);opacity:0;transition:opacity .2s}
.ct-export-toast.is-visible{opacity:1}
@media(max-width:480px){.ct-export-buttons{grid-template-columns:1fr}}

/* Analysis sheet — screen: hidden but in DOM; print: only thing shown */
.ct-analysis-sheet{display:none}
.as-head{border-bottom:3px double var(--ink);padding-bottom:18px;margin-bottom:24px}
.as-eyebrow{font-family:var(--mono);font-size:0.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.as-title{font-size:2.2rem;font-weight:800;letter-spacing:-.02em;margin:6px 0 4px;color:var(--ink)}
.as-sub{font-size:1.1rem;color:var(--accent);font-weight:600}
.as-meta{font-family:var(--mono);font-size:0.78rem;color:var(--muted);margin-top:6px}
.as-section{margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--line-2)}
.as-section h3{font-size:0.92rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);margin-bottom:10px;padding-left:10px;border-left:4px solid var(--accent)}
.as-section h4{font-size:0.95rem;font-weight:700;color:var(--ink);margin:10px 0 4px}
.as-table{width:100%;border-collapse:collapse;font-size:0.95rem}
.as-table tr{border-bottom:1px solid var(--line-2)}
.as-table td{padding:6px 8px;vertical-align:top}
.as-table td:first-child{color:var(--muted);width:48%}
.as-table td:last-child{font-family:var(--mono);text-align:right}
.as-note{font-size:0.88rem;color:var(--muted);margin:6px 0}
.as-assume{margin:6px 0 0 18px;padding:0}
.as-assume li{font-size:0.88rem;color:var(--muted);margin-bottom:7px}
.as-side{margin:10px 0 14px}
.as-final{background:var(--ink);color:var(--bg);padding:22px;margin-top:16px}
.as-final-label{font-size:0.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.7;margin-bottom:6px}
.as-final-value{font-size:3.2rem;font-weight:800;letter-spacing:-.03em;color:var(--accent);line-height:1}
.as-final-unit{font-size:1.1rem;font-weight:500;color:var(--bg);margin-left:6px}
.as-final-sub{font-size:1rem;opacity:.9;border-top:1px solid #444;padding-top:10px;margin-top:10px}
.as-foot{margin-top:24px;padding-top:14px;border-top:2px solid var(--ink);font-family:var(--mono);font-size:0.78rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}

/* Print */
@media print {
  @page { margin: 14mm; size: auto; }
  body { background:#fff; color:#000; font-size:11pt; }
  .nav, .headline, .colophon, .ct-card, .ct-results, .ct-calc-btn, .ct-export { display:none !important; }
  main { padding:0 !important; max-width:none !important; }
  .ct-analysis-sheet { display:block !important; }
  .ct-analysis-sheet { color:#000; }
  .as-section { page-break-inside: avoid; }
  .as-final { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .as-head, .as-foot { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

</header>
<main>
  <div class="headline">
    <div>
      <h1>Corrected Thrust &amp; RPM</h1>
      <div class="tagline">A test-cell correction tool. Affinity-law math for fan and propeller measurements.</div>
    </div>
  </div>
  <div data-ct-app></div>
  <div class="colophon">Set in Helvetica Neue. Math by affinity laws. © 2026 Transparent Tools.</div>
</main>
<script src="./_engine.js"></script>
<script src="./_shell.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/service-worker.js').catch(()=>{});}</script>
</body>
</html>
